name: Validar políticas de ramas

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  validar-ramas:
    name: Validar ramas y reglas de merge
    runs-on: ubuntu-latest
    steps:
      - name: Mostrar contexto de evento
        run: |
          echo "Evento: $GITHUB_EVENT_NAME"
          echo "Ref: $GITHUB_REF"
          echo "Sha: $GITHUB_SHA"
      - name: Validar reglas de ramas
        shell: bash
        env:
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: |
          set -euo pipefail

          event_name="${GITHUB_EVENT_NAME:-}" 
          head_branch=""
          base_branch=""

          if [[ "$event_name" == "pull_request" ]]; then
            head_branch="$(jq -r '.pull_request.head.ref' "$GITHUB_EVENT_PATH")"
            base_branch="$(jq -r '.pull_request.base.ref' "$GITHUB_EVENT_PATH")"
          else
            head_branch="${GITHUB_REF#refs/heads/}"
          fi

          echo "Head branch: $head_branch"
          if [[ -n "$base_branch" ]]; then
            echo "Base branch: $base_branch"
          fi

          invalid() {
            echo "ERROR: $1"
            exit 1
          }

          # Regla 1: Nombre de branch feature
          if [[ "$head_branch" =~ ^feature ]]; then
            if [[ ! "$head_branch" =~ ^feature[a-zA-Z0-9_-]+$ ]]; then
              invalid "Las ramas feature deben llamarse con el prefijo 'feature' seguido de un nombre de módulo, por ejemplo feature-usuario o featureCarrito."
            fi
          fi

          # Regla 2 y 3: No permitir merge directo de feature a main; sólo a develop o testing
          if [[ "$event_name" == "pull_request" && "$head_branch" =~ ^feature ]]; then
            if [[ "$base_branch" == "main" ]]; then
              invalid "No se permite merge directo de una rama feature a main. Debe hacerse a develop o testing primero."
            fi
            if [[ "$base_branch" != "develop" && "$base_branch" != "Testing" && "$base_branch" != "testing" ]]; then
              invalid "Las ramas feature sólo pueden hacer merge a develop o testing. Base actual: $base_branch."
            fi
          fi

          # Regla 4: Develop sólo puede hacer merge a main
          if [[ "$event_name" == "pull_request" && "$head_branch" == "develop" ]]; then
            if [[ "$base_branch" != "main" ]]; then
              invalid "La rama develop sólo puede hacer merge a main. Base actual: $base_branch."
            fi
          fi

          # Regla adicional: Testing sólo puede hacer merge a develop
          if [[ "$event_name" == "pull_request" && ("$head_branch" == "Testing" || "$head_branch" == "testing") ]]; then
            if [[ "$base_branch" != "develop" ]]; then
              invalid "La rama Testing sólo puede hacer merge a develop. Base actual: $base_branch."
            fi
          fi

          echo "Validación completada correctamente."
